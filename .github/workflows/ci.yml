name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# GOWORK=off is set on every step that calls the Go toolchain.
# The go.work file lists example modules that depend on a separate
# gl-purego checkout (not available in CI), so workspace mode would
# fail trying to resolve that replace path.  With GOWORK=off each
# module uses only its own go.mod, which only has local replace
# directives that are always present (v3.3/glfw => ./v3.3/glfw etc.).

jobs:
  # ── Cross-platform build + vet ─────────────────────────────────────────────

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }}${{ matrix.tags && format(' tags={0}', matrix.tags) || '' }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux X11
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          # Linux Wayland
          - { goos: linux,   goarch: amd64, tags: wayland }
          - { goos: linux,   goarch: arm64, tags: wayland }
          # Windows
          - { goos: windows, goarch: amd64 }
          - { goos: windows, goarch: arm64 }
          # macOS
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          GOWORK: "off"
        run: |
          FLAGS=""
          [ -n "${{ matrix.tags }}" ] && FLAGS="-tags ${{ matrix.tags }}"
          # Root module (cmd/ programs) + each versioned sub-module.
          # Examples are excluded: they need a separate gl-purego checkout.
          # Note: -C must be the first flag on the command line.
          go build $FLAGS ./...
          for mod in v3.3/glfw v3.0/glfw v3.1/glfw v3.2/glfw v3.4/glfw; do
            go build -C "$mod" $FLAGS ./...
          done

      - name: vet
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          GOWORK: "off"
        run: |
          FLAGS=""
          [ -n "${{ matrix.tags }}" ] && FLAGS="-tags ${{ matrix.tags }}"
          go vet $FLAGS ./...
          for mod in v3.3/glfw v3.0/glfw v3.1/glfw v3.2/glfw v3.4/glfw; do
            go vet -C "$mod" $FLAGS ./...
          done

  # ── Linux X11 smoke test (real runtime) ───────────────────────────────────

  test-linux-x11:
    name: Smoke test Linux X11
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install X11 + GL libs
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libx11-dev libxi-dev libxrandr-dev libxcursor-dev libxxf86vm-dev \
            libgl1-mesa-dev xvfb

      - name: Run smoke test (Xvfb)
        env:
          GOWORK: "off"
        run: |
          Xvfb :99 -screen 0 1280x720x24 &
          sleep 1
          DISPLAY=:99 go run ./cmd/test_linux
        timeout-minutes: 2

  # ── Linux Wayland smoke test (real runtime) ────────────────────────────────

  test-linux-wayland:
    name: Smoke test Linux Wayland
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install Wayland + EGL libs
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libwayland-dev libwayland-egl-backend-dev libegl1-mesa-dev \
            libwayland-cursor0 weston

      - name: Run smoke test (headless Weston)
        env:
          GOWORK: "off"
          XDG_RUNTIME_DIR: /tmp/wayland-runtime
        run: |
          mkdir -p /tmp/wayland-runtime
          # 0700 is required by Wayland/weston for the runtime dir.
          chmod 0700 /tmp/wayland-runtime
          # -S wayland-0 forces the socket name (weston may auto-choose
          # wayland-1 if it thinks another compositor owns wayland-0).
          weston --backend=headless -S wayland-0 --no-config 2>&1 &
          WESTON_PID=$!
          # Wait for Weston to create its socket (up to 15 s).
          for i in $(seq 1 30); do
            if [ -S "/tmp/wayland-runtime/wayland-0" ]; then break; fi
            sleep 0.5
          done
          if [ ! -S "/tmp/wayland-runtime/wayland-0" ]; then
            echo "Weston socket not found after 15 s; runtime dir contents:"
            ls -la /tmp/wayland-runtime/ || echo "(empty)"
            kill "$WESTON_PID" || true
            exit 1
          fi
          WAYLAND_DISPLAY=wayland-0 go run -tags wayland ./cmd/test_wayland
          kill $WESTON_PID || true
        timeout-minutes: 3

  # ── macOS smoke test (headless — no display needed for non-window APIs) ────

  test-macos:
    name: Smoke test macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Run headless smoke test
        env:
          GOWORK: "off"
        run: go run ./cmd/test_darwin
        timeout-minutes: 2
